<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindEase Bot</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Inter&display=swap" rel="stylesheet">

<style>
:root {
--bg:#0f172a;
--card:#1e293b;
--neon:#00f2ff;
--purple:#7000ff;
--user:#334155;
--bot:#020617;
}

body {
margin:0;
background:var(--bg);
color:white;
font-family:'Inter';
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

#app {
width:420px;
height:650px;
background:var(--card);
border-radius:25px;
display:flex;
flex-direction:column;
box-shadow:0 0 25px rgba(0,255,255,0.2);
border:1px solid rgba(0,255,255,0.2);
overflow:hidden;
}

header {
padding:15px;
text-align:center;
font-family:'Orbitron';
color:var(--neon);
text-shadow:0 0 10px var(--neon),0 0 20px var(--purple);
}

#chat {
flex:1;
padding:15px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:10px;
}

.msg {
padding:12px 15px;
border-radius:15px;
max-width:80%;
animation:fade 0.3s ease;
}

.user {
background:var(--user);
align-self:flex-end;
}

.bot {
background:rgba(0,242,255,0.08);
border:1px solid var(--neon);
align-self:flex-start;
}

@keyframes fade {
from {opacity:0; transform:translateY(10px);}
to {opacity:1; transform:translateY(0);}
}

.input-area {
display:flex;
padding:15px;
gap:10px;
background:#020617;
}

input {
flex:1;
padding:12px;
border-radius:20px;
border:none;
background:#0f172a;
color:white;
outline:none;
}

button {
width:45px;
height:45px;
border-radius:50%;
border:none;
background:linear-gradient(45deg,var(--neon),var(--purple));
cursor:pointer;
font-size:18px;
}

button:hover {
box-shadow:0 0 15px var(--neon);
}

#typing {
font-size:12px;
color:var(--neon);
}
</style>
</head>

<body>

<div id="app">
<header>MIND EASE ⚡</header>

<div id="chat">
<div class="msg bot">Yo bro 😎 what's the scene?</div>
</div>

<div id="typing"></div>

<div class="input-area">
<input id="input" placeholder="Vent here..." />
<button onclick="send()">➤</button>
</div>
</div>

<script>
let messages = [];

function addMsg(text, type) {
const chat = document.getElementById("chat");

const div = document.createElement("div");
div.className = "msg " + type;
div.innerHTML = text.replace(/\*\*(.*?)\*\*/g, "<b>$1</b>");

chat.appendChild(div);
chat.scrollTop = chat.scrollHeight;
}

async function send() {
const input = document.getElementById("input");
const typing = document.getElementById("typing");

if (!input.value.trim()) return;

const msg = input.value;
addMsg(msg, "user");

messages.push({
role: "user",
parts: [{ text: msg }]
});

input.value = "";
typing.innerText = "MindEase is typing...";

try {
const res = await fetch("/api/chat", {
method: "POST",
headers: {"Content-Type":"application/json"},
body: JSON.stringify({ messages })
});

const data = await res.json();
typing.innerText = "";

addMsg(data.reply, "bot");

messages.push({
role: "model",
parts: [{ text: data.reply }]
});

} catch {
typing.innerText = "";
addMsg("Network issue bro 😭", "bot");
}
}

document.getElementById("input").addEventListener("keypress", e=>{
if(e.key==="Enter") send();
});
</script>

</body>
</html>
