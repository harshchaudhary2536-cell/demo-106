<!DOCTYPE html>
<html>
<head>
<title>MindEase</title>
<style>
body { background:#0f172a; color:white; font-family:sans-serif; display:flex; justify-content:center; align-items:center; height:100vh; }
#app { width:400px; height:600px; background:#1e293b; display:flex; flex-direction:column; border-radius:20px; }
#chat { flex:1; overflow:auto; padding:10px; }
.msg { margin:5px; padding:10px; border-radius:10px; }
.user { background:#334155; text-align:right; }
.bot { background:#020617; white-space:pre-wrap; }
input { flex:1; padding:10px; }
button { width:60px; }
</style>
</head>

<body>

<div id="app">
  <div id="chat">
    <div class="msg bot">OpenRouter Mode 🚀</div>
  </div>

  <div style="display:flex;">
    <input id="input" placeholder="Type..." />
    <button onclick="send()">➤</button>
  </div>
</div>

<script>
let messages = [];

function addMsg(text, type) {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  chat.appendChild(div);
}

async function send() {
  const input = document.getElementById("input");

  if (!input.value.trim()) return;

  const msg = input.value;
  addMsg(msg, "user");

  messages.push({
    role: "user",
    parts: [{ text: msg }]
  });

  input.value = "";

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ messages })
    });

    const data = await res.json();

    if (!res.ok) {
      addMsg("⚠️ ERROR:\n" + JSON.stringify(data, null, 2), "bot");
      return;
    }

    addMsg("✅ " + data.reply, "bot");

  } catch (e) {
    addMsg("❌ FETCH ERROR: " + e.message, "bot");
  }
}
</script>

</body>
</html>
