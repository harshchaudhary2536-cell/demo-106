<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindEase AI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
  margin:0;
  font-family:'Inter', sans-serif;
  background:#343541;
  color:white;
  display:flex;
  height:100vh;
}

/* Sidebar */
.sidebar {
  width:260px;
  background:#202123;
  padding:15px;
}

.sidebar h2 {
  font-size:16px;
  margin-bottom:20px;
}

.new-chat {
  padding:10px;
  border:1px solid #444;
  border-radius:8px;
  cursor:pointer;
  text-align:center;
}

.new-chat:hover {
  background:#2a2b32;
}

/* Main */
.main {
  flex:1;
  display:flex;
  flex-direction:column;
}

/* Chat */
#chat {
  flex:1;
  overflow-y:auto;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.msg {
  max-width:70%;
  padding:12px 15px;
  border-radius:10px;
  line-height:1.4;
}

.user {
  background:#444654;
  align-self:flex-end;
}

.bot {
  background:#3e3f4b;
  align-self:flex-start;
}

/* Typing */
.typing {
  font-size:12px;
  opacity:0.7;
}

/* Input */
.input-area {
  display:flex;
  padding:15px;
  background:#40414f;
}

input {
  flex:1;
  padding:12px;
  border-radius:8px;
  border:none;
  outline:none;
  background:#343541;
  color:white;
}

button {
  margin-left:10px;
  padding:12px 18px;
  border:none;
  border-radius:8px;
  background:#19c37d;
  color:white;
  cursor:pointer;
}

button:hover {
  opacity:0.9;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>MindEase ⚡</h2>
  <div class="new-chat" onclick="clearChat()">+ New Chat</div>
</div>

<div class="main">

  <div id="chat">
    <div class="msg bot">Hey bro 😎 what's going on?</div>
  </div>

  <div class="input-area">
    <input id="input" placeholder="Send a message..." />
    <button onclick="send()">Send</button>
  </div>

</div>

<script>
let messages = [];

function addMsg(text, type) {
  const chat = document.getElementById("chat");

  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const chat = document.getElementById("chat");

  const div = document.createElement("div");
  div.id = "typing";
  div.className = "msg bot typing";
  div.innerText = "MindEase is typing...";

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById("typing");
  if (t) t.remove();
}

async function send() {
  const input = document.getElementById("input");

  if (!input.value.trim()) return;

  const msg = input.value;

  addMsg(msg, "user");

  messages.push({
    role: "user",
    parts: [{ text: msg }]
  });

  input.value = "";

  showTyping();

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ messages })
    });

    const data = await res.json();

    removeTyping();

    if (!res.ok) {
      addMsg("⚠️ " + data.error, "bot");
      return;
    }

    addMsg(data.reply, "bot");

    messages.push({
      role: "model",
      parts: [{ text: data.reply }]
    });

  } catch {
    removeTyping();
    addMsg("❌ Server error", "bot");
  }
}

function clearChat() {
  document.getElementById("chat").innerHTML = "";
  messages = [];
}

document.getElementById("input").addEventListener("keypress", e=>{
  if(e.key==="Enter") send();
});
</script>

</body>
</html>
