<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindEase AI ⚡</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Inter&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Inter';
  background:#020617;
  color:white;
  display:flex;
  height:100vh;
}

/* MOBILE FIX */
@media(max-width:768px){
  body { flex-direction:column; }
  .sidebar { width:100%; display:flex; justify-content:space-around; }
  .main { height:100vh; }
}

.sidebar {
  width:220px;
  background:#020617;
  border-right:1px solid #00f2ff33;
  padding:10px;
}

.sidebar h2 {
  font-family:'Orbitron';
  color:#00f2ff;
  text-shadow:0 0 10px #00f2ff;
}

.sidebar button {
  display:block;
  width:100%;
  margin:5px 0;
}

/* MAIN */
.main {
  flex:1;
  display:flex;
  flex-direction:column;
}

/* CHAT */
#chat {
  flex:1;
  overflow:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
}

.msg {
  max-width:80%;
  padding:10px;
  margin:5px;
  border-radius:10px;
  font-size:14px;
}

.user {
  align-self:flex-end;
  background:#1e293b;
}

.bot {
  align-self:flex-start;
  border:1px solid #00f2ff55;
  box-shadow:0 0 10px #00f2ff33;
}

/* INPUT FIXED */
.input-area {
  display:flex;
  padding:10px;
  gap:5px;
  position:sticky;
  bottom:0;
  background:#020617;
}

input {
  flex:1;
  padding:10px;
  border-radius:10px;
  border:1px solid #00f2ff55;
  background:#020617;
  color:white;
}

button {
  padding:8px 10px;
  border:none;
  border-radius:8px;
  background:linear-gradient(45deg,#00f2ff,#7000ff);
  color:white;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>MindEase ⚡</h2>
  <button onclick="setMode('chill')">😌 Chill</button>
  <button onclick="setMode('funny')">😂 Funny</button>
  <button onclick="setMode('savage')">😈 Savage</button>
  <button onclick="toggleCall()">📞 Call Mode</button>
</div>

<div class="main">

<div id="chat">
  <div class="msg bot">Kya scene hai bro 😎 bata kya chal raha hai</div>
</div>

<div class="input-area">
  <input id="input" placeholder="Bol ya likh bro..." />
  <button onclick="startVoice()">🎤</button>
  <button onclick="stopVoice()">⏹️</button>
  <button onclick="send()">➤</button>
</div>

</div>

<script>
let messages = [];
let mode = "chill";
let callMode = false;
let recognition;
let isListening = false;

// 🎭 MODE
function setMode(m){
  mode = m;
  alert("Mode: " + m);
}

// 📞 CALL MODE (REAL-TIME)
function toggleCall(){
  callMode = !callMode;
  alert(callMode ? "Call Mode ON 📞" : "Call Mode OFF");
  if(callMode) startVoice();
}

// 🔊 SPEAK
function speak(text){
  window.speechSynthesis.cancel();

  const speech = new SpeechSynthesisUtterance(text);
  speech.lang = "hi-IN"; // Hindi + Hinglish
  speech.rate = 1;

  speech.onend = () => {
    if(callMode) startVoice(); // 🔁 continuous convo
  };

  window.speechSynthesis.speak(speech);
}

// ⏹️ STOP
function stopVoice(){
  callMode = false;
  window.speechSynthesis.cancel();

  if(recognition && isListening){
    recognition.stop();
    isListening = false;
  }
}

// 🎤 VOICE INPUT
function startVoice(){
  if(isListening) return;

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();

  recognition.lang = "hi-IN"; // Hindi support
  recognition.continuous = false;

  isListening = true;

  recognition.onresult = (e)=>{
    const text = e.results[0][0].transcript;
    document.getElementById("input").value = text;
    send();
  };

  recognition.onend = ()=>{
    isListening = false;
  };

  recognition.start();
}

// 💬 ADD MESSAGE
function addMsg(text,type){
  const chat = document.getElementById("chat");

  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;

  if(type==="bot") speak(text);
}

// 🚀 SEND
async function send(){
  const input = document.getElementById("input");

  if(!input.value.trim()) return;

  const msg = input.value;

  addMsg(msg,"user");

  messages.push({
    role:"user",
    parts:[{text:msg}]
  });

  input.value="";

  try{
    const res = await fetch("/api/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({messages,mode})
    });

    const data = await res.json();

    addMsg(data.reply,"bot");

    messages.push({
      role:"model",
      parts:[{text:data.reply}]
    });

  }catch{
    addMsg("Error bro 😭","bot");
  }
}

// ENTER
document.getElementById("input").addEventListener("keypress", e=>{
  if(e.key==="Enter") send();
});
</script>

</body>
</html>
