<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MindEase Neon AI ⚡</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Inter&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Inter';
  background:#020617;
  color:white;
  display:flex;
  height:100vh;
}

.sidebar {
  width:220px;
  background:#020617;
  border-right:1px solid #00f2ff33;
  padding:15px;
}

.sidebar h2 {
  font-family:'Orbitron';
  color:#00f2ff;
  text-shadow:0 0 10px #00f2ff;
}

button {
  margin:5px 0;
  padding:8px;
  border:none;
  border-radius:8px;
  background:linear-gradient(45deg,#00f2ff,#7000ff);
  color:white;
  cursor:pointer;
}

.main {
  flex:1;
  display:flex;
  flex-direction:column;
}

#chat {
  flex:1;
  overflow:auto;
  padding:15px;
  display:flex;
  flex-direction:column;
}

.msg {
  max-width:70%;
  padding:10px;
  margin:5px;
  border-radius:10px;
}

.user {
  align-self:flex-end;
  background:#1e293b;
}

.bot {
  align-self:flex-start;
  background:#020617;
  border:1px solid #00f2ff55;
  box-shadow:0 0 10px #00f2ff33;
}

.input-area {
  display:flex;
  padding:10px;
}

input {
  flex:1;
  padding:10px;
  border-radius:10px;
  border:1px solid #00f2ff55;
  background:#020617;
  color:white;
}

</style>
</head>

<body>

<div class="sidebar">
  <h2>MindEase ⚡</h2>

  <button onclick="setMode('chill')">😌 Chill</button>
  <button onclick="setMode('funny')">😂 Funny</button>
  <button onclick="setMode('savage')">😈 Savage</button>
  <button onclick="startVoice()">🎤 Speak</button>
</div>

<div class="main">

<div id="chat">
  <div class="msg bot">Yo bro 😎 I got you.</div>
</div>

<div class="input-area">
  <input id="input" placeholder="Talk to me..." />
  <button onclick="send()">➤</button>
</div>

</div>

<script>
let messages = [];
let mode = "chill";

function setMode(m) {
  mode = m;
  alert("Mode: " + m);
}

function speak(text) {
  const speech = new SpeechSynthesisUtterance(text);
  speech.rate = 1;
  speech.lang = "en-US";
  window.speechSynthesis.speak(speech);
}

function addMsg(text, type) {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;

  if(type === "bot") speak(text);
}

async function send() {
  const input = document.getElementById("input");
  if (!input.value.trim()) return;

  const msg = input.value;
  addMsg(msg, "user");

  messages.push({
    role:"user",
    parts:[{text:msg}]
  });

  input.value = "";

  try {
    const res = await fetch("/api/chat", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({messages, mode})
    });

    const data = await res.json();

    addMsg(data.reply, "bot");

    messages.push({
      role:"model",
      parts:[{text:data.reply}]
    });

  } catch {
    addMsg("Error bro 😭", "bot");
  }
}

function startVoice() {
  const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.lang = "en-US";

  recognition.onresult = function(e) {
    document.getElementById("input").value = e.results[0][0].transcript;
    send();
  };

  recognition.start();
}

document.getElementById("input").addEventListener("keypress", e=>{
  if(e.key==="Enter") send();
});
</script>

</body>
</html>
