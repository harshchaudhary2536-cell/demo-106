<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MindEase Neon AI ⚡</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Inter&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Inter';
  background:#020617;
  color:white;
  display:flex;
  height:100vh;
}

.sidebar {
  width:220px;
  background:#020617;
  border-right:1px solid #00f2ff33;
  padding:15px;
}

.sidebar h2 {
  font-family:'Orbitron';
  color:#00f2ff;
  text-shadow:0 0 10px #00f2ff;
}

button {
  margin:5px 0;
  padding:8px;
  border:none;
  border-radius:8px;
  background:linear-gradient(45deg,#00f2ff,#7000ff);
  color:white;
  cursor:pointer;
}

.main {
  flex:1;
  display:flex;
  flex-direction:column;
}

#chat {
  flex:1;
  overflow:auto;
  padding:15px;
  display:flex;
  flex-direction:column;
}

.msg {
  max-width:70%;
  padding:10px;
  margin:5px;
  border-radius:10px;
}

.user {
  align-self:flex-end;
  background:#1e293b;
}

.bot {
  align-self:flex-start;
  background:#020617;
  border:1px solid #00f2ff55;
  box-shadow:0 0 10px #00f2ff33;
}

.input-area {
  display:flex;
  padding:10px;
  gap:5px;
}

input {
  flex:1;
  padding:10px;
  border-radius:10px;
  border:1px solid #00f2ff55;
  background:#020617;
  color:white;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>MindEase ⚡</h2>

  <button onclick="setMode('chill')">😌 Chill</button>
  <button onclick="setMode('funny')">😂 Funny</button>
  <button onclick="setMode('savage')">😈 Savage</button>
</div>

<div class="main">

<div id="chat">
  <div class="msg bot">Yo bro 😎 I got you.</div>
</div>

<div class="input-area">
  <input id="input" placeholder="Talk to me..." />
  <button onclick="startVoice()">🎤</button>
  <button onclick="stopVoice()">⏹️</button>
  <button onclick="send()">➤</button>
</div>

</div>

<script>
let messages = [];
let mode = "chill";

let recognition = null;
let isListening = false;

// 🎭 MODE
function setMode(m) {
  mode = m;
  alert("Mode: " + m);
}

// ✅ CHECK VOICE SUPPORT
function initVoice() {
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
    alert("Voice not supported. Use Google Chrome.");
    return false;
  }
  return true;
}

// 🎤 START VOICE INPUT
function startVoice() {
  if (!initVoice()) return;
  if (isListening) return;

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();

  recognition.lang = "en-US";
  recognition.interimResults = false;
  recognition.continuous = false;

  isListening = true;

  recognition.onresult = (event) => {
    const text = event.results[0][0].transcript;
    document.getElementById("input").value = text;
    send();
  };

  recognition.onerror = (event) => {
    alert("Mic error: " + event.error);
    isListening = false;
  };

  recognition.onend = () => {
    isListening = false;
  };

  recognition.start();
}

// ⏹️ STOP VOICE
function stopVoice() {
  window.speechSynthesis.cancel();

  if (recognition && isListening) {
    recognition.stop();
    isListening = false;
  }
}

// 🔊 SPEAK OUTPUT
function speak(text) {
  if (!('speechSynthesis' in window)) return;

  window.speechSynthesis.cancel();

  const speech = new SpeechSynthesisUtterance(text);
  speech.lang = "en-US";
  speech.rate = 1;

  window.speechSynthesis.speak(speech);
}

// 💬 ADD MESSAGE
function addMsg(text, type) {
  const chat = document.getElementById("chat");

  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;

  if (type === "bot") speak(text);
}

// 🚀 SEND MESSAGE
async function send() {
  const input = document.getElementById("input");

  if (!input.value.trim()) return;

  const msg = input.value;

  addMsg(msg, "user");

  messages.push({
    role: "user",
    parts: [{ text: msg }]
  });

  input.value = "";

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ messages, mode })
    });

    const data = await res.json();

    if (!res.ok) {
      addMsg("⚠️ " + data.error, "bot");
      return;
    }

    addMsg(data.reply, "bot");

    messages.push({
      role: "model",
      parts: [{ text: data.reply }]
    });

  } catch {
    addMsg("❌ Server error", "bot");
  }
}

// ⌨️ ENTER KEY
document.getElementById("input").addEventListener("keypress", e=>{
  if(e.key==="Enter") send();
});
</script>

</body>
</html>
