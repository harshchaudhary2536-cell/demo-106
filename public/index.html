<!DOCTYPE html>
<html>
<head>
<title>MindEase</title>

<style>
body {
  margin:0;
  background:#0f172a;
  color:white;
  font-family:sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

#app {
  width:420px;
  height:650px;
  background:#1e293b;
  border-radius:20px;
  display:flex;
  flex-direction:column;
}

header {
  padding:15px;
  text-align:center;
  font-weight:bold;
  border-bottom:1px solid #334155;
}

#chat {
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
}

.msg {
  padding:10px;
  margin:5px;
  border-radius:10px;
  max-width:75%;
}

.user {
  background:#334155;
  align-self:flex-end;
}

.bot {
  background:#020617;
  align-self:flex-start;
}

.input-area {
  display:flex;
  padding:10px;
  border-top:1px solid #334155;
}

input {
  flex:1;
  padding:10px;
  border:none;
  outline:none;
  border-radius:10px;
}

button {
  margin-left:5px;
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:#00f2ff;
  cursor:pointer;
}
</style>

</head>

<body>

<div id="app">

<header>MindEase AI ⚡</header>

<div id="chat">
  <div class="msg bot">Yo bro 😎 what's going on?</div>
</div>

<div class="input-area">
  <input id="input" placeholder="Type your message..." />
  <button onclick="send()">Send</button>
</div>

</div>

<script>
let messages = [];

function addMsg(text, type) {
  const chat = document.getElementById("chat");

  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function send() {
  const input = document.getElementById("input");

  if (!input.value.trim()) return;

  const msg = input.value;

  addMsg(msg, "user");

  messages.push({
    role: "user",
    parts: [{ text: msg }]
  });

  input.value = "";

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ messages })
    });

    const data = await res.json();

    if (!res.ok) {
      addMsg("⚠️ " + data.error, "bot");
      return;
    }

    addMsg(data.reply, "bot");

    messages.push({
      role: "model",
      parts: [{ text: data.reply }]
    });

  } catch (e) {
    addMsg("❌ Server error", "bot");
  }
}

document.getElementById("input").addEventListener("keypress", e=>{
  if(e.key==="Enter") send();
});
</script>

</body>
</html>
